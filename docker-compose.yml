services:
  db:
    image: postgres:14.21
    container_name: servicedesk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-servicedesk}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - servicedesk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-servicedesk}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: servicedesk-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Default: ${CONNECTIONSTRINGS__DEFAULT:-Host=db;Port=5432;Database=servicedesk;Username=postgres;Password=postgres}
      JWT__ISSUER: ${JWT__ISSUER:-ServiceDesk}
      JWT__AUDIENCE: ${JWT__AUDIENCE:-ServiceDesk.Client}
      JWT__KEY: ${JWT__KEY:-CHANGE_ME_TO_A_LONG_RANDOM_SECRET}
      JWT__EXPIRES_MINUTES: ${JWT__EXPIRES_MINUTES:-60}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin123!}
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  servicedesk_pgdata:
